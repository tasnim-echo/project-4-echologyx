<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echologyx</title>
    <!-- link css -->
    <link rel="stylesheet" href="/styles/style.css" />
  </head>
  <body>
    <div class="container">
      <!-- home page CONTENT -->
      <div id="homeView">
        <main>
          <div class="left">
            <!-- header -->
            <header class="logo">
              <img
                src="/assets/companylogo/Echologyx-Logo 1.png"
                alt="Echologyx"
              />
            </header>
            <div class="left-content">
              <h1>Hello and welcome.</h1>
              <p>Before we begin, please select a type of development.</p>

              <div class="buttons">
                <button>Front-end development</button>
                <button>Back-end development</button>
                <button>Full stack development</button>
              </div>
            </div>
          </div>

          <div class="right">
            <img src="/assets/Coding-cuate 1.png" alt="Developer " />
          </div>
        </main>
      </div>

      <!-- SKILL VIEW -->
      <div style="display: none" id="skillView">
        <main>
          <div class="left">
            <!-- SAME header -->
            <header class="logo">
              <img
                src="/assets/companylogo/Echologyx-Logo 1.png"
                alt="Echologyx"
              />
            </header>

            <div class="left-content">
              <!-- Skill Logo -->
              <div class="skill-logo">
                <img id="skill-logo" src="" alt="" />
              </div>

              <div class="shadow">
                <img src="/assets/shadow.png" alt="" />
              </div>
            </div>
          </div>

          <div class="right">
            <!-- Progress -->
            <div class="progress-wrapper">
              <p id="progressLabel" class="progress-label"></p>

              <div class="progress">
                <div class="progress-fill"></div>
              </div>
            </div>

            <div class="right-content">
              <h2 id="skillTitle"></h2>
              <span id="skillDesc"> </span>
              <p id="skillQuestion"></p>

              <div class="buttons">
                <button id="yesBtn">Yes</button>
                <button id="noBtn">No</button>
              </div>
            </div>
          </div>
        </main>
      </div>

      <!-- end page -->
      <div style="display: none" id="endpage">
        <main>
          <div class="endPage-left">
            <!-- header -->
            <header class="logo">
              <img
                src="/assets/companylogo/Echologyx-Logo 1.png"
                alt="Echologyx"
              />
            </header>

            <div class="endPage-left-content">
              <h1>Thank you!</h1>
              <p>
                Here are the summary of <span id="endPage-skillTitle"></span>
              </p>

              <div id="endPage-skillLists"></div>

              <a id="back-to-home" href="#">Back to home</a>
            </div>
          </div>

          <div class="endPage-right">
            <img src="/assets/Programming-pana 1.png" alt="" />
          </div>
        </main>
      </div>

      <!-- footer -->
      <footer class="footer">
        Copyright © 2022 ECHOLOGYX. All rights reserved
      </footer>
    </div>

    <script src="/js/app.js"></script>
  </body>
</html>
